      listen       [::]:443 ssl http2;
      server_name  mtg.kyso.dev;
    ssl_certificate /etc/letsencrypt/live/kyso.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kyso.dev/privkey.pem; # managed by Certbot
      ssl_session_cache    shared:SSL:1m;
      ssl_session_timeout  5m;
      ssl_ciphers  HIGH:!aNULL:!MD5;
      ssl_prefer_server_ciphers  on;
      location / {
          root   /srv/http/mtg.kyso.dev;
          index  index.html index.htm index.php;
      }

      location ~ \.php$ {
        root /usr/share/nginx/html;
        fastcgi_pass unix:/run/php-fpm/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
      }
      location ~ /\.ht {
        deny all;
      }
}
