
#user html;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    
    sendfile        on;
    keepalive_timeout  65;

    server {
      if ($host = kyso.dev) {
          return 301 https://$host$request_uri;
      } # managed by Certbot
        listen       80;
        listen [::]:80;
        server_name  kyso.dev;
        return 301 https://$host$request_uri;
        #charset koi8-r;
        #access_log  logs/host.access.log  main;
    }
    server {
      if ($host = mtg.kyso.dev) {
        return 301 https://$host$request_uri;
      } # managed by Certbot
      listen 80;
      listen [::]:80;
      server_name mtg.kyso.dev;
      return 301 https://$host$request_uri;
    }
    server {
      if ($host = repo.kyso.dev) {
        return 301 https://$host$request_uri;
      }
      listen 80;
      listen [::]:80;
      server_name repo.kyso.dev;
      return 301 https://$host$request_uri;
}
    server {
      server_name plex.kyso.dev;
      resolver 8.8.4.4 8.8.8.8 valid=300s;
      resolver_timeout 10s;
      listen [::]:443 ssl ipv6only=on; # managed by Certbot
      listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kyso.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kyso.dev/privkey.pem; # managed by Certbot
      include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
      ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
      client_max_body_size 100M;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;
      proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
      proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_redirect off;
      proxy_buffering off;
      location / {
        proxy_pass http://localhost:32400;
      }
    




}
